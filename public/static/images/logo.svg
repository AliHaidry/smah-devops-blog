<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 56" width="260" height="56" role="img">
  <title>alihaidry.dev — Ali Haidry DevOps Blog</title>
  <desc>Terminal prompt logo for Ali Haidry</desc>

  <!-- Terminal box -->
  <rect x="0" y="2" width="52" height="52" rx="9" fill="#0f172a"/>

  <!-- Traffic lights -->
  <circle cx="12" cy="16" r="3.5" fill="#ff5f57"/>
  <circle cx="22" cy="16" r="3.5" fill="#ffbd2e"/>
  <circle cx="32" cy="16" r="3.5" fill="#28c840"/>

  <!-- ~/ prompt -->
  <text x="8" y="40" font-family="'Courier New',Courier,monospace" font-size="11" fill="#00D4AA">~/</text>

  <!-- AH text -->
  <text x="24" y="41" font-family="'Courier New',Courier,monospace" font-size="17" font-weight="700" fill="#ffffff">AH</text>

  <!-- Blinking cursor -->
  <rect x="44" y="27" width="6" height="14" rx="1.5" fill="#0078D4"/>

  <!-- Name -->
  <text x="68" y="30" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="800" fill="currentColor">Ali Haidry</text>

  <!-- Domain -->
  <text x="70" y="48" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#0078D4" letter-spacing="0.3">alihaidry.dev</text>
</svg>
